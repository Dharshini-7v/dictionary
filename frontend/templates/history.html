<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="theme-toggle">
                <button id="themeBtn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
            <h1>📜 Search History</h1>
            <p class="subtitle">Your recent searches</p>
            <p class="user-info"><a href="{{ url_for('index') }}">← Back to Search</a></p>
        </div>

        <div class="history-full">
            {% if history %}
            <div class="history-list full">
                {% for item in history %}
                <div class="history-item">
                    <span class="history-number">#{{ loop.index }}</span>
                    <span class="history-word">{{ item.word }}</span>
                    <span class="history-result">{{ item.result }}</span>
                </div>
                {% endfor %}
            </div>
            
            <form action="{{ url_for('clear_history') }}" method="post" class="clear-form-full">
                <button type="submit" class="clear-btn">Clear All History</button>
            </form>
            {% else %}
            <div class="empty-state">
                <p>No search history yet.</p>
                <a href="{{ url_for('index') }}" class="back-link">Start Searching →</a>
            </div>
            {% endif %}
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').textContent = '☀️';
            }
        };
    </script>
</body>
</html>
