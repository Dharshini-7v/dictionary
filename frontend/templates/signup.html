<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Dictionary Search</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="theme-toggle">
                <button id="themeBtn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                    <span id="themeIcon">🌙</span>
                </button>
            </div>
            <h1>📝 Sign Up</h1>
            <p class="subtitle">Create your account</p>
        </div>

        <form method="post" class="auth-form">
            <div class="input-wrapper">
                <input type="text" id="username" name="username" placeholder="Username (min 3 chars)" required>
            </div>
            <div class="input-wrapper">
                <input type="password" id="password" name="password" placeholder="Password (min 6 chars)" required>
            </div>
            <div class="input-wrapper">
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="search-btn">Create Account</button>
        </form>

        <p class="auth-links">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="result not-found animate">
            {% for message in messages %}
            <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeIcon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').textContent = '☀️';
            }
        };
    </script>
</body>
</html>
